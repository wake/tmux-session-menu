syntax = "proto3";

package tsm.v1;

option go_package = "github.com/wake/tmux-session-menu/api/tsm/v1;tsmv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// SessionStatus 對應 tmux.SessionStatus。
enum SessionStatus {
  SESSION_STATUS_IDLE = 0;
  SESSION_STATUS_RUNNING = 1;
  SESSION_STATUS_WAITING = 2;
  SESSION_STATUS_ERROR = 3;
}

// Session 對應 tmux.Session。
message Session {
  string name = 1;
  string id = 2;
  string path = 3;
  bool attached = 4;
  google.protobuf.Timestamp activity = 5;
  SessionStatus status = 6;
  string ai_model = 7;
  string ai_summary = 8;
  string group_name = 9;
  int32 sort_order = 10;
  string custom_name = 11;
  string ai_type = 12;     // "claude" / "" — AI agent presence
}

// Group 對應 store.Group。
message Group {
  int64 id = 1;
  string name = 2;
  int32 sort_order = 3;
  bool collapsed = 4;
}

// StateSnapshot 是 Watch stream 推送的全量快照。
message StateSnapshot {
  repeated Session sessions = 1;
  repeated Group groups = 2;
  repeated UploadEvent upload_events = 3;
}

// HostStatus 描述主機連線狀態。
enum HostStatus {
  HOST_STATUS_DISABLED     = 0;
  HOST_STATUS_CONNECTING   = 1;
  HOST_STATUS_CONNECTED    = 2;
  HOST_STATUS_DISCONNECTED = 3;
}

// HostState 描述一台主機的連線狀態與快照。
message HostState {
  string host_id = 1;
  string name = 2;
  string color = 3;
  HostStatus status = 4;
  string error = 5;
  StateSnapshot snapshot = 6;
  string address = 7;  // SSH 地址（空字串 = hub 本機）
}

// MultiHostSnapshot 聚合所有主機的狀態快照。
message MultiHostSnapshot {
  repeated HostState hosts = 1;
}

// MutationType 列舉所有可被代理的操作類型。
enum MutationType {
  MUTATION_KILL_SESSION   = 0;
  MUTATION_RENAME_SESSION = 1;
  MUTATION_CREATE_SESSION = 2;
  MUTATION_MOVE_SESSION   = 3;
}

// ProxyMutationRequest 由遠端 TUI 發送，透過 hub 代理到目標主機。
message ProxyMutationRequest {
  string host_id = 1;
  MutationType type = 2;
  string session_name = 3;
  string new_name = 4;
  string group_id = 5;
  string path = 6;       // session 啟動路徑
  string command = 7;    // agent 啟動指令
}

// ProxyMutationResponse 代理操作結果。
message ProxyMutationResponse {
  bool success = 1;
  string error = 2;
}

// HostConfigEntry 描述一台主機的完整設定（對應 config.HostEntry）。
message HostConfigEntry {
  string name = 1;
  string address = 2;      // 唯讀，僅由 hub daemon 端設定
  string color = 3;         // accent color（圓點、badge_bg fallback）
  bool enabled = 4;
  int32 sort_order = 5;
  string bar_bg = 6;
  string bar_fg = 7;
  string badge_bg = 8;
  string badge_fg = 9;
  bool archived = 10;
}

// GetHostsConfigRequest 取得主機設定清單。
message GetHostsConfigRequest {}

// GetHostsConfigResponse 回傳主機設定清單。
message GetHostsConfigResponse {
  repeated HostConfigEntry hosts = 1;
}

// HostConfigAction 列舉主機設定的操作類型。
enum HostConfigAction {
  HOST_CONFIG_ACTION_UNSPECIFIED = 0;  // 預留：daemon 應拒絕此值
  HOST_CONFIG_ENABLE = 1;
  HOST_CONFIG_DISABLE = 2;
  HOST_CONFIG_ARCHIVE = 3;
  HOST_CONFIG_UNARCHIVE = 4;
  HOST_CONFIG_UPDATE_COLORS = 5;
  HOST_CONFIG_REORDER = 6;
}

// UpdateHostConfigRequest 更新主機設定。
message UpdateHostConfigRequest {
  string host_name = 1;
  HostConfigAction action = 2;
  // UPDATE_COLORS 使用：
  string bar_bg = 3;
  string bar_fg = 4;
  string badge_bg = 5;
  string badge_fg = 6;
  string color = 7;
  // REORDER 使用：完整排序清單（所有非封存主機名稱，按期望順序排列）
  repeated string ordered_hosts = 8;
}

// UpdateHostConfigResponse 回傳操作後的完整主機清單。
message UpdateHostConfigResponse {
  repeated HostConfigEntry hosts = 1;
}

// WatchRequest 是 Watch RPC 的請求（目前為空，未來可擴充過濾條件）。
message WatchRequest {}

// WatchMultiHostRequest 是 WatchMultiHost RPC 的請求（hub 模式專用）。
message WatchMultiHostRequest {}

// CreateSessionRequest 建立新的 tmux session。
message CreateSessionRequest {
  string name = 1;
  string path = 2;
  string command = 3; // agent 啟動指令（空字串=純 shell）
}

// KillSessionRequest 刪除指定的 tmux session。
message KillSessionRequest {
  string name = 1;
}

// RenameSessionRequest 設定 session 的自訂顯示名稱，並可選擇重命名 tmux session。
message RenameSessionRequest {
  string session_name = 1;
  string custom_name = 2;
  string new_session_name = 3;  // 重命名 tmux session（空 = 不變）
}

// RenameGroupRequest 重命名群組。
message RenameGroupRequest {
  int64 group_id = 1;
  string new_name = 2;
}

// CreateGroupRequest 建立新的群組。
message CreateGroupRequest {
  string name = 1;
  int32 sort_order = 2;
}

// MoveSessionRequest 將 session 移動到指定群組。
message MoveSessionRequest {
  string session_name = 1;
  int64 group_id = 2;
  int32 sort_order = 3;
}

// ReorderRequest 重新排序群組或群組內的 session。
message ReorderRequest {
  // 被排序的對象類型
  oneof target {
    GroupReorder group = 1;
    SessionReorder session = 2;
  }
}

message GroupReorder {
  int64 group_id = 1;
  int32 new_sort_order = 2;
}

message SessionReorder {
  string session_name = 1;
  int64 group_id = 2;
  int32 new_sort_order = 3;
}

// ToggleCollapseRequest 切換群組的展開/收合狀態。
message ToggleCollapseRequest {
  int64 group_id = 1;
}

// DaemonStatusResponse 回傳 daemon 的狀態資訊。
message DaemonStatusResponse {
  int32 pid = 1;
  google.protobuf.Timestamp started_at = 2;
  int32 watcher_count = 3;
  string version = 4;
}

// ConfigValue 代表一個設定鍵值對。
message ConfigValue {
  string key = 1;
  string value = 2;
}

// GetConfigRequest 取得設定。
message GetConfigRequest {}

// GetConfigResponse 回傳設定值。
message GetConfigResponse {
  repeated ConfigValue values = 1;
}

// SetConfigRequest 設定值（可一次設定多個）。
message SetConfigRequest {
  repeated ConfigValue values = 1;
}

// UploadedFile 代表一個已上傳的檔案。
message UploadedFile {
  string local_path = 1;
  string remote_path = 2;
  int64 size_bytes = 3;
}

// UploadEvent 代表一次上傳事件的結果。
message UploadEvent {
  repeated UploadedFile files = 1;
  string error = 2;
  int64 timestamp = 3;
}

// GetUploadTargetRequest 查詢當前 focused session 的上傳目標資訊。
message GetUploadTargetRequest {}

// GetUploadTargetResponse 回傳上傳目標判斷結果。
message GetUploadTargetResponse {
  bool upload_mode = 1;
  bool is_remote = 2;
  bool is_claude_active = 3;
  string ssh_target = 4;
  int32 ssh_port = 5;
  string upload_path = 6;
  string session_name = 7;
}

// SetUploadModeRequest 設定上傳模式開關。
message SetUploadModeRequest {
  bool enabled = 1;
  string session_name = 2;
}

// ReportUploadResultRequest 回報上傳結果。
message ReportUploadResultRequest {
  string session_name = 1;
  repeated UploadedFile files = 2;
  string error = 3;
}

// SessionManager 是 tsm daemon 的核心 gRPC service。
service SessionManager {
  // Watch 建立 server streaming，持續推送 StateSnapshot。
  // 連線後立即推送一次初始快照，之後每當狀態變更時推送差異快照。
  rpc Watch(WatchRequest) returns (stream StateSnapshot);

  // 操作型 unary RPCs — 操作完成後變更透過 Watch stream 自動推送。
  rpc CreateSession(CreateSessionRequest) returns (google.protobuf.Empty);
  rpc KillSession(KillSessionRequest) returns (google.protobuf.Empty);
  rpc RenameSession(RenameSessionRequest) returns (google.protobuf.Empty);
  rpc CreateGroup(CreateGroupRequest) returns (google.protobuf.Empty);
  rpc RenameGroup(RenameGroupRequest) returns (google.protobuf.Empty);
  rpc MoveSession(MoveSessionRequest) returns (google.protobuf.Empty);
  rpc Reorder(ReorderRequest) returns (google.protobuf.Empty);
  rpc ToggleCollapse(ToggleCollapseRequest) returns (google.protobuf.Empty);

  // DaemonStatus 回傳 daemon 的狀態資訊。
  rpc DaemonStatus(google.protobuf.Empty) returns (DaemonStatusResponse);

  // GetConfig 取得 daemon 所在主機的設定。
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  // SetConfig 更新 daemon 所在主機的設定。
  rpc SetConfig(SetConfigRequest) returns (google.protobuf.Empty);

  // GetUploadTarget 查詢當前 focused session 的上傳目標。
  rpc GetUploadTarget(GetUploadTargetRequest) returns (GetUploadTargetResponse);
  // SetUploadMode 設定上傳模式開關（TUI 控制）。
  rpc SetUploadMode(SetUploadModeRequest) returns (google.protobuf.Empty);
  // ReportUploadResult 回報上傳結果（coprocess 呼叫）。
  rpc ReportUploadResult(ReportUploadResultRequest) returns (google.protobuf.Empty);

  // WatchMultiHost 回傳多主機聚合快照 stream（hub 模式專用）。
  rpc WatchMultiHost(WatchMultiHostRequest) returns (stream MultiHostSnapshot);

  // ProxyMutation 將操作代理到目標主機的 daemon（hub 模式專用）。
  rpc ProxyMutation(ProxyMutationRequest) returns (ProxyMutationResponse);

  // GetHostsConfig 取得 daemon 所在主機的 hosts 設定。
  rpc GetHostsConfig(GetHostsConfigRequest) returns (GetHostsConfigResponse);
  // UpdateHostConfig 更新 daemon 所在主機的 hosts 設定。
  rpc UpdateHostConfig(UpdateHostConfigRequest) returns (UpdateHostConfigResponse);
}
